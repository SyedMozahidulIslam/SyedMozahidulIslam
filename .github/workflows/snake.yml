# ============================================================
# FILE: .github/workflows/snake.yml
# LOCATION IN YOUR REPO: SyedMozahidulIslam/.github/workflows/snake.yml
#
# PURPOSE: Auto-generates the snake contribution animation SVGs
#          and commits them to the "output" branch of your profile repo.
#
# HOW TO USE:
#   1. In your GitHub profile repo (SyedMozahidulIslam/SyedMozahidulIslam),
#      create the file at exactly this path:
#      .github/workflows/snake.yml
#   2. Paste the content below (starting from the "name:" line).
#   3. Go to your repo Settings → Actions → General →
#      set "Workflow permissions" to "Read and write permissions".
#   4. The action will run daily at midnight UTC and on every push to main.
#   5. After the first run, an "output" branch will be created with:
#        - github-contribution-grid-snake.svg
#        - github-contribution-grid-snake-dark_update.svg
#        - github-contribution-grid-snake_update.svg
# ============================================================

name: Generate Snake Animation

on:
  schedule:
    # Runs every day at midnight UTC
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate Snake (Light Theme)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake_update.svg?palette=github
            dist/github-contribution-grid-snake-dark_update.svg?palette=github-dark

      - name: Push Snake SVGs to Output Branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
